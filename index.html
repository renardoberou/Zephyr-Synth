<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zephyr Synth</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --fg: #f5f5f5;
      --muted: #333333;
      --accent: #ff6600;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 28px 0 12px;
      font-size: 2.2rem;
      font-weight: 700;
    }

    #start {
      margin-bottom: 20px;
      padding: 10px 14px;
      border: 1px solid #666;
      background: #f0f0f0;
      color: #111;
      font-size: 16px;
      cursor: pointer;
    }

    #start.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .panel {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: center;
      padding: 12px;
    }

    .knob {
      position: relative;
      width: 140px;
      height: 140px;
      touch-action: none;
      user-select: none;
    }

    .knob canvas {
      position: absolute;
      inset: 0;
      width: 140px;
      height: 140px;
      display: block;
    }

    .hint {
      margin-top: 10px;
      color: #bdbdbd;
      font-size: 14px;
      text-align: center;
      padding: 0 16px 24px;
    }
  </style>
</head>
<body>
  <h1>Zephyr Synth</h1>
  <button id="start" type="button">Start Audio</button>

  <div class="panel">
    <div class="knob" data-param="volume" aria-label="Volume knob">
      <canvas class="bg" width="140" height="140"></canvas>
      <canvas class="fg" width="140" height="140"></canvas>
    </div>
  </div>

  <div class="hint">
    Tap Start Audio, then drag up or down on the knob.
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
