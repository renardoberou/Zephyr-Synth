<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zephyr Synth</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --panel: #222;
      --panel-2: #2a2a2a;
      --fg: #f3f3f3;
      --muted: #a8a8a8;
      --accent: #ff6600;
      --border: #3b3b3b;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: Arial, sans-serif;
    }

    .app {
      max-width: 1500px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    h1 {
      margin: 0 0 14px;
      text-align: center;
      font-size: 2.2rem;
    }

    .topbar {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    #start {
      padding: 10px 14px;
      border: 1px solid #666;
      background: #f0f0f0;
      color: #111;
      font-size: 16px;
      cursor: pointer;
    }

    #start.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .status {
      color: var(--muted);
      font-size: 14px;
    }

    .synth-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .panel {
      background: linear-gradient(180deg, var(--panel), #1d1d1d);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      letter-spacing: 0.04em;
      color: var(--fg);
    }

    .osc-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      align-items: center;
    }

    .knob-pair {
      display: grid;
      grid-template-columns: repeat(2, 140px);
      gap: 12px;
      justify-content: center;
    }

    .knob {
      position: relative;
      width: 140px;
      height: 140px;
      touch-action: none;
      user-select: none;
      margin: 0 auto;
    }

    .knob canvas {
      position: absolute;
      inset: 0;
      width: 140px;
      height: 140px;
      display: block;
    }

    .knob-value {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--fg);
      pointer-events: none;
      text-align: center;
      padding: 0 24px;
    }

    .param-list {
      display: grid;
      gap: 10px;
    }

    .param {
      display: grid;
      gap: 4px;
    }

    .param label {
      font-size: 13px;
      color: var(--muted);
    }

    .param input,
    .param select {
      width: 100%;
      padding: 8px 10px;
      background: var(--panel-2);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
    }

    .matrix-panel {
      display: grid;
      gap: 12px;
    }

    .route-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1.2fr;
      gap: 8px;
      align-items: center;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
    }

    .route-row .amount-wrap {
      display: grid;
      gap: 4px;
    }

    .route-row .amount-readout {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
    }

    .keyboard {
      margin-top: 18px;
      background: linear-gradient(180deg, var(--panel), #1d1d1d);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px;
    }

    .key {
      height: 120px;
      border-radius: 10px;
      background: #f5f5f5;
      color: #111;
      border: 1px solid #d5d5d5;
      font-size: 16px;
      cursor: pointer;
      touch-action: none;
    }

    .key:active,
    .key.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 980px) {
      .route-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .osc-grid {
        grid-template-columns: 1fr;
      }

      .knob-pair {
        grid-template-columns: 1fr;
      }

      .keys {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Zephyr Synth</h1>

    <div class="topbar">
      <button id="start" type="button">Start Audio</button>
      <div class="status" id="status">Audio not started</div>
    </div>

    <div class="synth-grid">
      <section class="panel">
        <h2>OSC 1</h2>
        <div class="osc-grid">
          <div class="knob" data-param="osc1.gain">
            <canvas class="bg" width="140" height="140"></canvas>
            <canvas class="fg" width="140" height="140"></canvas>
            <div class="knob-value" id="osc1-gain-readout">0.70</div>
          </div>
          <div class="param-list">
            <div class="param">
              <label for="osc1-wave">Waveform</label>
              <select id="osc1-wave">
                <option value="sine">Sine</option>
                <option value="sawtooth" selected>Saw</option>
                <option value="square">Square</option>
                <option value="triangle">Triangle</option>
              </select>
            </div>
            <div class="param">
              <label for="osc1-detune">Detune (cents)</label>
              <input id="osc1-detune" type="range" min="-50" max="50" step="1" value="0" />
            </div>
            <div class="status" id="osc1-detune-readout">0 ct</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>OSC 2</h2>
        <div class="osc-grid">
          <div class="knob" data-param="osc2.gain">
            <canvas class="bg" width="140" height="140"></canvas>
            <canvas class="fg" width="140" height="140"></canvas>
            <div class="knob-value" id="osc2-gain-readout">0.50</div>
          </div>
          <div class="param-list">
            <div class="param">
              <label for="osc2-wave">Waveform</label>
              <select id="osc2-wave">
                <option value="sine">Sine</option>
                <option value="sawtooth" selected>Saw</option>
                <option value="square">Square</option>
                <option value="triangle">Triangle</option>
              </select>
            </div>
            <div class="param">
              <label for="osc2-detune">Detune (cents)</label>
              <input id="osc2-detune" type="range" min="-50" max="50" step="1" value="-7" />
            </div>
            <div class="status" id="osc2-detune-readout">-7 ct</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>OSC 3</h2>
        <div class="osc-grid">
          <div class="knob" data-param="osc3.gain">
            <canvas class="bg" width="140" height="140"></canvas>
            <canvas class="fg" width="140" height="140"></canvas>
            <div class="knob-value" id="osc3-gain-readout">0.50</div>
          </div>
          <div class="param-list">
            <div class="param">
              <label for="osc3-wave">Waveform</label>
              <select id="osc3-wave">
                <option value="sine">Sine</option>
                <option value="sawtooth" selected>Saw</option>
                <option value="square">Square</option>
                <option value="triangle">Triangle</option>
              </select>
            </div>
            <div class="param">
              <label for="osc3-detune">Detune (cents)</label>
              <input id="osc3-detune" type="range" min="-50" max="50" step="1" value="7" />
            </div>
            <div class="status" id="osc3-detune-readout">7 ct</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>FILTER</h2>
        <div class="osc-grid">
          <div class="knob" data-param="filter.cutoff">
            <canvas class="bg" width="140" height="140"></canvas>
            <canvas class="fg" width="140" height="140"></canvas>
            <div class="knob-value" id="filter-cutoff-readout">1200 Hz</div>
          </div>
          <div class="param-list">
            <div class="param">
              <label for="filter-resonance">Resonance</label>
              <input id="filter-resonance" type="range" min="0.1" max="20" step="0.1" value="0.5" />
            </div>
            <div class="status" id="filter-resonance-readout">0.5</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>ENVELOPE / MASTER</h2>
        <div class="osc-grid">
          <div class="knob" data-param="master.gain">
            <canvas class="bg" width="140" height="140"></canvas>
            <canvas class="fg" width="140" height="140"></canvas>
            <div class="knob-value" id="master-gain-readout">0.60</div>
          </div>
          <div class="param-list">
            <div class="param">
              <label for="env-attack">Attack</label>
              <input id="env-attack" type="range" min="0.001" max="2" step="0.001" value="0.01" />
            </div>
            <div class="status" id="env-attack-readout">0.010 s</div>

            <div class="param">
              <label for="env-decay">Decay</label>
              <input id="env-decay" type="range" min
